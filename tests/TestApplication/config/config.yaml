imports:
    - { resource: "@BitExpertSyliusProductDocumentPlugin/config/config.yaml" }
    - { resource: "services_test.php" }

twig:
    paths:
        '%kernel.project_dir%/../../../tests/TestApplication/templates': ~

sylius_product:
    resources:
        product:
            classes:
                model: Tests\BitExpert\SyliusProductDocumentPlugin\Entity\Product

doctrine_migrations:
    migrations_paths:
        'BitExpertSyliusProductDocumentPlugin': '%kernel.project_dir%/../../../src/Migrations'

doctrine:
    orm:
        entity_managers:
            default:
                mappings:
                    TestApplication:
                        is_bundle: false
                        type: attribute
                        dir: '%kernel.project_dir%/../../../tests/TestApplication/src/Entity'
                        prefix: Tests\BitExpert\SyliusProductDocumentPlugin
